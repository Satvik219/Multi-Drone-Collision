spec_version: 1
name: drone_env
description: Multi-drone delivery coordination environment for real-world fleet routing tasks
version: 0.1.0
type: space
runtime: fastapi
app: server.app:app
port: 8000
action: DroneAction
observation: DroneObservation
tags:
  - openenv
  - logistics
  - drones
  - multi-agent

tasks:
  - id: easy
    difficulty: easy
    description: Move a single drone to its delivery goal with strong delivery success, path optimality, and time efficiency
    max_steps: 20
    grader:
      type: python
      entrypoint: graders:grade_easy_episode

  - id: medium
    difficulty: medium
    description: Coordinate two drones to complete deliveries without collisions while maintaining load balancing and path quality
    max_steps: 30
    grader:
      type: python
      entrypoint: graders:grade_medium_episode

  - id: hard
    difficulty: hard
    description: Coordinate two drones through dense and dynamic obstacles while remaining safe, robust, and efficient
    max_steps: 40
    grader:
      type: python
      entrypoint: graders:grade_hard_episode